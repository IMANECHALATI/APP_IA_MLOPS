<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroFlow | Dashboard d'Irrigation Intelligente</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.21.4/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --primary: #1a5c38;
            --primary-mid: #2e7d52;
            --primary-light: rgba(46, 125, 82, 0.12);
            --accent: #7ec56b;
            --urgent: #c0392b;
            --moderate: #d4870a;
            --glass: rgba(255, 255, 255, 0.82);
            --glass-border: rgba(255, 255, 255, 0.55);
            --glass-dark: rgba(10, 30, 18, 0.65);
            --text-dark: #0d1f15;
            --text-muted: #5a7268;
            --shadow-card: 0 4px 24px rgba(0,0,0,0.10);
            --transition: all 0.32s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        h1, h2, h3 { font-family: 'Playfair Display', serif; }

        /* ============================================
           BACKGROUND IMAGE — REMPLACEZ L'URL ICI 👇
           ============================================ */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: url('https://images.unsplash.com/photo-1625246333195-78d9c38ad449?w=1920&q=80');
            /* ↑↑ REMPLACER PAR VOTRE IMAGE ↑↑ */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: brightness(0.7) saturate(1.1);
        }

        .bg-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: linear-gradient(
                135deg,
                rgba(8, 28, 16, 0.72) 0%,
                rgba(20, 60, 35, 0.55) 50%,
                rgba(10, 40, 22, 0.68) 100%
            );
            backdrop-filter: blur(1px);
        }

        #root { position: relative; z-index: 2; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }

        header {
            background: var(--glass-dark);
            backdrop-filter: blur(20px) saturate(1.5);
            border-bottom: 1px solid rgba(255,255,255,0.12);
            padding: 0.9rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content { display: flex; justify-content: space-between; align-items: center; }

        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.02em;
        }

        .logo em { color: var(--accent); font-style: italic; }

        .logo-icon {
            background: linear-gradient(135deg, var(--primary-mid), var(--accent));
            color: white;
            padding: 9px;
            border-radius: 13px;
            display: flex;
            box-shadow: 0 4px 14px rgba(126, 197, 107, 0.35);
        }

        .header-right { display: flex; align-items: center; gap: 16px; }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 16px;
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 600;
            background: rgba(255,255,255,0.10);
            border: 1px solid rgba(255,255,255,0.18);
            color: white;
        }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .status-online { background: #34d399; box-shadow: 0 0 10px #34d399; animation: pulse 2s infinite; }
        .status-offline { background: #f87171; box-shadow: 0 0 8px #f87171; }
        @keyframes pulse { 0%,100%{box-shadow:0 0 6px #34d399} 50%{box-shadow:0 0 14px #34d399} }

        nav {
            display: flex;
            gap: 6px;
            margin: 2rem 0;
            background: var(--glass-dark);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.13);
            padding: 6px;
            border-radius: 16px;
            width: fit-content;
        }

        .nav-btn {
            padding: 10px 22px;
            border: none;
            background: none;
            border-radius: 11px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            color: rgba(255,255,255,0.65);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .nav-btn.active {
            background: linear-gradient(135deg, var(--primary-mid), var(--accent));
            color: white;
            box-shadow: 0 4px 14px rgba(46, 125, 82, 0.4);
        }

        .nav-btn:not(.active):hover { color: white; background: rgba(255,255,255,0.08); }

        .card {
            background: var(--glass);
            backdrop-filter: blur(22px) saturate(1.6);
            border: 1px solid var(--glass-border);
            border-radius: 22px;
            padding: 2rem;
            box-shadow: var(--shadow-card);
            animation: fadeUp 0.45s ease-out both;
        }

        .card h2, .card h3 { color: var(--primary); }

        @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

        .grid-2 {
            display: grid;
            grid-template-columns: 1.35fr 0.65fr;
            gap: 1.8rem;
            align-items: start;
        }

        @media (max-width: 960px) { .grid-2 { grid-template-columns: 1fr; } }

        .form-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.1rem;
        }

        .form-group-title {
            grid-column: span 2;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 0.5rem;
            padding-bottom: 8px;
            border-bottom: 1.5px solid rgba(46,125,82,0.18);
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--primary-mid);
        }

        .input-group { display: flex; flex-direction: column; gap: 5px; }

        .input-group label {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        input, select {
            padding: 9px 12px;
            border: 1.5px solid rgba(46,125,82,0.2);
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            background: rgba(255,255,255,0.7);
            transition: var(--transition);
            color: var(--text-dark);
        }

        input:focus, select:focus {
            border-color: var(--primary-mid);
            outline: none;
            background: rgba(255,255,255,0.95);
            box-shadow: 0 0 0 3px rgba(46,125,82,0.12);
        }

        .btn-submit {
            grid-column: span 2;
            background: linear-gradient(135deg, var(--primary), var(--primary-mid));
            color: white;
            padding: 13px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.95rem;
            font-family: 'DM Sans', sans-serif;
            transition: var(--transition);
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 16px rgba(30,90,55,0.35);
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(30,90,55,0.45);
            filter: brightness(1.08);
        }

        .btn-submit:disabled { background: #b0bec5; cursor: not-allowed; box-shadow: none; }

        .result-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 2rem 1.5rem;
            border-radius: 20px;
            border: 2px solid transparent;
            min-height: 360px;
            justify-content: center;
        }

        .res-high { background: rgba(254,242,242,0.92); border-color: #fca5a5; color: var(--urgent); }
        .res-medium { background: rgba(255,251,235,0.92); border-color: #fcd34d; color: var(--moderate); }
        .res-low { background: rgba(240,253,244,0.92); border-color: #86efac; color: var(--primary); }

        .confidence-bar {
            width: 100%;
            height: 7px;
            background: rgba(0,0,0,0.08);
            border-radius: 4px;
            margin: 1.2rem 0 0.6rem;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: currentColor;
            border-radius: 4px;
            transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 1.2rem;
            margin-bottom: 1.8rem;
        }

        .metric-card {
            background: var(--glass);
            backdrop-filter: blur(18px);
            border: 1px solid var(--glass-border);
            padding: 1.4rem 1.5rem;
            border-radius: 18px;
            text-align: center;
            box-shadow: var(--shadow-card);
        }

        .metric-value { font-size: 2.2rem; font-weight: 800; color: var(--primary); font-family: 'Playfair Display', serif; }
        .metric-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 4px; }

        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { text-align: left; padding: 12px; color: var(--text-muted); font-size: 0.78rem; letter-spacing: 0.8px; text-transform: uppercase; border-bottom: 2px solid rgba(46,125,82,0.12); }
        td { padding: 13px 12px; border-bottom: 1px solid rgba(46,125,82,0.08); font-size: 0.88rem; }
        tr:hover td { background: rgba(46,125,82,0.04); }

        .badge { padding: 4px 11px; border-radius: 7px; font-size: 0.73rem; font-weight: 700; letter-spacing: 0.5px; }

        .loader {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 18px; height: 18px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 280px;
            opacity: 0.45;
            color: var(--text-muted);
            gap: 12px;
        }

        .pipeline { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
        .pipeline-step {
            background: var(--primary-light);
            padding: 6px 13px;
            border-radius: 8px;
            font-size: 0.78rem;
            color: var(--primary);
            font-weight: 600;
        }

        .class-row { display: flex; align-items: center; gap: 14px; padding: 10px 0; border-bottom: 1px solid rgba(46,125,82,0.08); }
        .class-row:last-child { border-bottom: none; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(46,125,82,0.3); border-radius: 3px; }

        footer {
            text-align: center;
            padding: 2.5rem 0;
            color: rgba(255,255,255,0.45);
            font-size: 0.82rem;
            position: relative;
            z-index: 2;
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>
    <div class="bg-overlay"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const API_BASE = "http://127.0.0.1:8000";

        const DEFAULTS = {
            // Numériques (scalées)
            Temperature_C:          25,
            Humidity:               60,
            Rainfall_mm:            500,
            Wind_Speed_kmh:         15,
            Field_Area_hectare:     10,
            Previous_Irrigation_mm: 20,
            // Catégorielles (encodées)
            Crop_Growth_Stage: 'Vegetative',
            Season:            'Spring',
            Irrigation_Type:   'Drip',
            Mulching_Used:     'No',
            Region:            'North',
        };

        function App() {
            const [activeTab, setActiveTab]   = useState('prediction');
            const [isOnline, setIsOnline]     = useState(false);
            const [loading, setLoading]       = useState(false);
            const [metrics, setMetrics]       = useState(null);
            const [modelInfo, setModelInfo]   = useState(null);
            const [prediction, setPrediction] = useState(null);
            const [history, setHistory]       = useState([]);
            const [error, setError]           = useState(null);
            const [formData, setFormData]     = useState(DEFAULTS);

            const set = (k, v) => setFormData(p => ({ ...p, [k]: v }));

            useEffect(() => {
                checkStatus();
                const iv = setInterval(checkStatus, 15000);
                return () => clearInterval(iv);
            }, []);

            const checkStatus = async () => {
                try {
                    const res = await fetch(`${API_BASE}/health`);
                    setIsOnline(res.ok);
                    if (res.ok) fetchMetrics();
                } catch { setIsOnline(false); }
            };

            const fetchMetrics = async () => {
                try {
                    const [mr, mo] = await Promise.all([
                        fetch(`${API_BASE}/metrics`),
                        fetch(`${API_BASE}/model-info`)
                    ]);
                    setMetrics(await mr.json());
                    setModelInfo(await mo.json());
                } catch (e) { console.error(e); }
            };

            const handlePredict = async (e) => {
                e.preventDefault();
                setLoading(true); setError(null);
                try {
                    const res = await fetch(`${API_BASE}/predict`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData)
                    });
                    const data = await res.json();
                    setPrediction(data);
                    // ✅ Fix: timestamp local + guard NaN confidence
                    setHistory(prev => [{ ...data, ...formData, _localTime: new Date().toLocaleTimeString() }, ...prev]);
                    fetchMetrics();
                } catch {
                    setError("Erreur de connexion à l'API. Vérifiez que le serveur tourne sur le port 8000.");
                } finally {
                    setLoading(false);
                }
            };

            const styleOf  = c => c === "High" ? "res-high" : c === "Medium" ? "res-medium" : "res-low";
            const labelOf  = c => c === "High" ? "Irrigation Urgente" : c === "Medium" ? "Irrigation Modérée" : "Pas d'Irrigation";
            const adviceOf = c => {
                if (c === "High")   return "Appliquez 35–50 mm d'eau immédiatement. Stress hydrique critique détecté.";
                if (c === "Medium") return "Planifiez un arrosage de 20–30 mm dans les prochaines 24 heures.";
                return "Sol bien hydraté — aucune action requise. Continuez la surveillance.";
            };

            const Tabs = [
                { id: 'prediction', icon: 'zap',     label: 'Prédiction' },
                { id: 'monitoring', icon: 'activity', label: 'Monitoring' },
                { id: 'history',    icon: 'history',  label: 'Historique' },
                { id: 'model',      icon: 'cpu',      label: 'Modèle'     },
            ];

            return (
                <div>
                    <header>
                        <div className="container header-content">
                            <div className="logo">
                                <div className="logo-icon"><i data-lucide="sprout"></i></div>
                                Agro<em>Flow</em>
                            </div>
                            <div className="header-right">
                                <div className="status-pill">
                                    <span className={`status-dot ${isOnline ? 'status-online' : 'status-offline'}`}></span>
                                    {isOnline ? 'API Connectée' : 'API Hors-ligne'}
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="container">
                        <nav>
                            {Tabs.map(t => (
                                <button key={t.id}
                                    className={`nav-btn ${activeTab === t.id ? 'active' : ''}`}
                                    onClick={() => setActiveTab(t.id)}>
                                    <i data-lucide={t.icon}></i>{t.label}
                                </button>
                            ))}
                        </nav>

                        {/* ── PRÉDICTION ── */}
                        {activeTab === 'prediction' && (
                            <div className="grid-2">
                                <div className="card">
                                    <h2 style={{marginBottom:'1.4rem', fontSize:'1.5rem'}}>Paramètres du Modèle</h2>
                                    <form onSubmit={handlePredict} className="form-section">

                                        <div className="form-group-title" style={{gridColumn:'span 2'}}>
                                            <i data-lucide="cloud-sun" style={{width:14,height:14}}></i> Données Météorologiques
                                        </div>
                                        <div className="input-group">
                                            <label>Température (°C)</label>
                                            <input type="number" step="0.1" value={formData.Temperature_C} onChange={e => set('Temperature_C', e.target.value)} />
                                        </div>
                                        <div className="input-group">
                                            <label>Humidité (%)</label>
                                            <input type="number" min="0" max="100" value={formData.Humidity} onChange={e => set('Humidity', e.target.value)} />
                                        </div>
                                        <div className="input-group">
                                            <label>Précipitations (mm)</label>
                                            <input type="number" min="0" value={formData.Rainfall_mm} onChange={e => set('Rainfall_mm', e.target.value)} />
                                        </div>
                                        <div className="input-group">
                                            <label>Vitesse du Vent (km/h)</label>
                                            <input type="number" step="0.1" min="0" value={formData.Wind_Speed_kmh} onChange={e => set('Wind_Speed_kmh', e.target.value)} />
                                        </div>

                                        <div className="form-group-title" style={{gridColumn:'span 2'}}>
                                            <i data-lucide="droplets" style={{width:14,height:14}}></i> Irrigation & Culture
                                        </div>
                                        <div className="input-group">
                                            <label>Superficie (hectares)</label>
                                            <input type="number" step="0.1" min="0" value={formData.Field_Area_hectare} onChange={e => set('Field_Area_hectare', e.target.value)} />
                                        </div>
                                        <div className="input-group">
                                            <label>Dernière Irrigation (mm)</label>
                                            <input type="number" step="0.5" min="0" value={formData.Previous_Irrigation_mm} onChange={e => set('Previous_Irrigation_mm', e.target.value)} />
                                        </div>
                                        <div className="input-group">
                                            <label>Stade de Croissance</label>
                                            <select value={formData.Crop_Growth_Stage} onChange={e => set('Crop_Growth_Stage', e.target.value)}>
                                                {['Germination','Vegetative','Flowering','Maturity'].map(o => <option key={o}>{o}</option>)}
                                            </select>
                                        </div>
                                        <div className="input-group">
                                            <label>Saison</label>
                                            <select value={formData.Season} onChange={e => set('Season', e.target.value)}>
                                                {['Spring','Summer','Autumn','Winter'].map(o => <option key={o}>{o}</option>)}
                                            </select>
                                        </div>
                                        <div className="input-group">
                                            <label>Type d'Irrigation</label>
                                            <select value={formData.Irrigation_Type} onChange={e => set('Irrigation_Type', e.target.value)}>
                                                {['Drip','Sprinkler','Flood','Furrow','Center Pivot'].map(o => <option key={o}>{o}</option>)}
                                            </select>
                                        </div>
                                        <div className="input-group">
                                            <label>Paillage Utilisé</label>
                                            <select value={formData.Mulching_Used} onChange={e => set('Mulching_Used', e.target.value)}>
                                                {['Yes','No'].map(o => <option key={o}>{o}</option>)}
                                            </select>
                                        </div>
                                        <div className="input-group" style={{gridColumn:'span 2'}}>
                                            <label>Région</label>
                                            <select value={formData.Region} onChange={e => set('Region', e.target.value)}>
                                                {['North','South','East','West','Central'].map(o => <option key={o}>{o}</option>)}
                                            </select>
                                        </div>

                                        <button className="btn-submit" type="submit" disabled={!isOnline || loading}>
                                            {loading
                                                ? <><span className="loader"></span> Analyse en cours…</>
                                                : <><i data-lucide="zap" style={{width:16,height:16}}></i> Générer la Prédiction</>
                                            }
                                        </button>
                                    </form>
                                    {error && (
                                        <div style={{marginTop:'12px', padding:'10px 14px', background:'#fef2f2', borderRadius:'10px', color:'#c0392b', fontSize:'0.85rem', border:'1px solid #fca5a5'}}>
                                            ⚠ {error}
                                        </div>
                                    )}
                                </div>

                                <div style={{position:'sticky', top:'80px'}}>
                                    <div className="card">
                                        {prediction ? (
                                            <div className={`result-card ${styleOf(prediction.prediction_code)}`}>
                                                <i data-lucide="droplets" style={{width:'52px', height:'52px'}}></i>
                                                <h2 style={{margin:'1rem 0', fontSize:'1.4rem'}}>{labelOf(prediction.irrigation_need)}</h2>
                                                <p style={{fontWeight:600, fontSize:'0.95rem', lineHeight:1.5}}>{adviceOf(prediction.prediction_code)}</p>
                                                <div className="confidence-bar">
                                                    <div className="confidence-fill" style={{width:`${(prediction.confidence*100).toFixed(0)}%`}}></div>
                                                </div>
                                                <p style={{fontSize:'0.83rem', opacity:0.75}}>Confiance : {(prediction.confidence*100).toFixed(1)}%</p>
                                                <div style={{marginTop:'1.5rem', textAlign:'left', width:'100%', fontSize:'0.8rem', opacity:0.7}}>
                                                    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'8px'}}>
                                                        <div><strong>Version:</strong> {prediction.model_version}</div>
                                                        <div><strong>Heure:</strong> {new Date(prediction.timestamp).toLocaleTimeString()}</div>
                                                    </div>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="empty-state">
                                                <i data-lucide="clipboard-list" style={{width:'56px', height:'56px'}}></i>
                                                <p style={{fontWeight:600}}>Aucune analyse disponible</p>
                                                <p style={{fontSize:'0.85rem'}}>Remplissez les 11 paramètres<br/>et lancez la prédiction IA</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ── MONITORING ── */}
                        {activeTab === 'monitoring' && (
                            <div>
                                <div className="metrics-grid">
                                    {[
                                        { label:'Prédictions Totales', value: metrics?.total_predictions || 0, color:'var(--primary)' },
                                        { label:'Taux de Succès', value:`${metrics ? (metrics.success_rate*100).toFixed(1) : 100}%`, color:'#10b981' },
                                        { label:'Erreurs Serveur', value: metrics?.total_errors || 0, color:'var(--urgent)' },
                                        { label:'Uptime API', value:'99.9%', color:'#6366f1' },
                                    ].map((m,i) => (
                                        <div key={i} className="metric-card">
                                            <p className="metric-label">{m.label}</p>
                                            <p className="metric-value" style={{color:m.color}}>{m.value}</p>
                                        </div>
                                    ))}
                                </div>
                                <div className="card">
                                    <h3>Performance de l'Infrastructure</h3>
                                    <div className="confidence-bar" style={{height:'20px', borderRadius:'10px', marginTop:'1.2rem'}}>
                                        <div className="confidence-fill" style={{width:'98%', background:'linear-gradient(90deg, var(--primary), var(--accent))'}}></div>
                                    </div>
                                    <p style={{fontSize:'0.83rem', color:'var(--text-muted)', marginTop:'8px'}}>
                                        Système stable — RandomForestClassifier v{modelInfo?.version || '1.0'} — 11 features actives
                                    </p>
                                </div>
                            </div>
                        )}

                        {/* ── HISTORIQUE ── */}
                        {activeTab === 'history' && (
                            <div className="card">
                                <h3>Historique des Prédictions (session)</h3>
                                {history.length > 0 ? (
                                    <table>
                                        <thead>
                                            <tr>
                                                <th>Heure</th>
                                                <th>Saison</th>
                                                <th>Irrigation</th>
                                                <th>Paillage</th>
                                                <th>Région</th>
                                                <th>Confiance</th>
                                                <th>Statut</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {history.map((h,i) => (
                                                <tr key={i}>
                                                    {/* ✅ Fix Invalid Date */}
                                                    <td>{h._localTime || new Date(h.timestamp).toLocaleTimeString()}</td>
                                                    <td>{h.Season}</td>
                                                    <td>{h.Irrigation_Type}</td>
                                                    <td>{h.Mulching_Used}</td>
                                                    <td>{h.Region}</td>
                                                    {/* ✅ Fix NaN% */}
                                                    <td>{isNaN(h.confidence) || h.confidence == null ? '—' : (h.confidence*100).toFixed(1) + '%'}</td>
                                                    <td>
                                                        <span className={`badge ${styleOf(h.prediction_code)}`}>
                                                            {h.prediction_code}
                                                        </span>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                ) : (
                                    <p style={{marginTop:'1rem', color:'var(--text-muted)'}}>Aucune donnée enregistrée dans cette session.</p>
                                )}
                            </div>
                        )}

                        {/* ── MODÈLE ── */}
                        {activeTab === 'model' && (
                            <div className="grid-2">
                                <div className="card">
                                    <h3>Architecture du Modèle</h3>
                                    <div style={{display:'flex', flexDirection:'column', gap:'10px', marginTop:'1.4rem', fontSize:'0.9rem'}}>
                                        {[
                                            ['Algorithme',    modelInfo?.model_type   || 'RandomForestClassifier'],
                                            ['Estimateurs',   modelInfo?.n_estimators || 100],
                                            ['Profondeur Max',modelInfo?.max_depth    || 'Non limitée'],
                                            ['Features',      modelInfo?.n_features  || 11],
                                            ['Version',       modelInfo?.version      || '1.0'],
                                        ].map(([k,v]) => (
                                            <div key={k} style={{display:'flex', justifyContent:'space-between', padding:'8px 12px', background:'var(--primary-light)', borderRadius:'9px'}}>
                                                <span style={{fontWeight:600, color:'var(--text-muted)'}}>{k}</span>
                                                <span style={{fontWeight:700, color:'var(--primary)'}}>{v}</span>
                                            </div>
                                        ))}
                                    </div>
                                    <p style={{fontWeight:700, marginTop:'1.6rem', marginBottom:'4px', fontSize:'0.85rem', color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:'1px'}}>Pipeline</p>
                                    <div className="pipeline">
                                        {['Validation','StandardScaler','OneHotEncoder','RandomForest','JSON Response'].map((s,i,arr) => (
                                            <span key={s} className="pipeline-step">{s}{i<arr.length-1 ? ' →' : ' ✓'}</span>
                                        ))}
                                    </div>
                                    <p style={{fontWeight:700, marginTop:'1.6rem', marginBottom:'8px', fontSize:'0.85rem', color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:'1px'}}>Colonnes Numériques</p>
                                    <div style={{display:'flex', flexWrap:'wrap', gap:'6px'}}>
                                        {['Temperature_C','Humidity','Rainfall_mm','Wind_Speed_kmh','Field_Area_hectare','Previous_Irrigation_mm'].map(c => (
                                            <span key={c} style={{background:'#e0f2fe', color:'#0369a1', padding:'4px 10px', borderRadius:'7px', fontSize:'0.75rem', fontWeight:600}}>{c}</span>
                                        ))}
                                    </div>
                                    <p style={{fontWeight:700, marginTop:'1.2rem', marginBottom:'8px', fontSize:'0.85rem', color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:'1px'}}>Colonnes Catégorielles</p>
                                    <div style={{display:'flex', flexWrap:'wrap', gap:'6px'}}>
                                        {['Crop_Growth_Stage','Season','Irrigation_Type','Mulching_Used','Region'].map(c => (
                                            <span key={c} style={{background:'#fef3c7', color:'#92400e', padding:'4px 10px', borderRadius:'7px', fontSize:'0.75rem', fontWeight:600}}>{c}</span>
                                        ))}
                                    </div>
                                </div>
                                <div className="card">
                                    <h3>Classes de Sortie</h3>
                                    <div style={{marginTop:'1.4rem'}}>
                                        {[
                                            { code:'High',   desc:"Besoin hydrique critique — irrigation immédiate (35–50 mm)" },
                                            { code:'Medium', desc:"Besoin hydrique modéré — arrosage sous 24h (20–30 mm)" },
                                            { code:'Low',    desc:"Niveau optimal — aucune action requise" },
                                        ].map(({ code, desc }) => (
                                            <div key={code} className="class-row">
                                                <span className={`badge ${styleOf(code)}`} style={{minWidth:60, textAlign:'center'}}>{code}</span>
                                                <span style={{fontSize:'0.85rem', color:'var(--text-muted)'}}>{desc}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                    </main>

                    <footer>
                        &copy; 2026 AgroFlow Intelligence Artificielle — Technologie au service de la Terre
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
        setTimeout(() => lucide.createIcons(), 600);
    </script>
</body>
</html>
