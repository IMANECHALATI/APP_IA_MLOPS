services:

  api:
    build: .
    container_name: irrigation-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ./metrics:/app/metrics
    restart: unless-stopped

  mlflow:
    image: python:3.10-slim
    container_name: irrigation-mlflow
    working_dir: /mlflow
    volumes:
      - ./mlruns:/mlflow/mlruns
    ports:
      - "5000:5000"
    command: >
      bash -c "pip install mlflow --quiet &&
               mlflow ui --host 0.0.0.0 --port 5000"
    restart: unless-stopped

  dashboard:
    image: nginx:alpine
    container_name: irrigation-dashboard
    ports:
      - "80:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html
    restart: unless-stopped