base:
  random_state: 42
  project_name: "irrigation-intelligente"
  version: "1.0.0"

data:
  raw_path: "data/irrigation_prediction.csv"
  train_X_path: "data/train_X.csv"
  train_y_path: "data/train_y.csv"
  test_X_path: "data/test_X.csv"
  test_y_path: "data/test_y.csv"
  test_size: 0.2

train:
  n_estimators: 100
  max_depth: 10
  min_samples_split: 2
  min_samples_leaf: 1
  xgb_n_estimators: 100
  xgb_max_depth: 6
  xgb_learning_rate: 0.1

evaluate:
  accuracy_threshold: 0.75
  metrics_path: "metrics/scores.json"

mlflow:
  experiment_name: "s3id_ia"
  tracking_uri: "mlruns"
  model_registry_name: "IrrigationModel"

api:
  host: "0.0.0.0"
  port: 8000
  version: "1.0.0"